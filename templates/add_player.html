{% extends "base.html" %}
{% block title %}Add Player – Premier League DB{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
    <a href="{{ url_for('players') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back
    </a>
    <h2 class="fw-bold mb-0"><i class="bi bi-person-plus-fill text-success me-2"></i>Add New Player</h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white fw-bold">Player Information</div>
            <div class="card-body">
                <form method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">First Name *</label>
                            <input type="text" name="first_name" class="form-control" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Last Name *</label>
                            <input type="text" name="last_name" class="form-control" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nationality</label>
                            <input type="text" name="nationality" class="form-control"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Date of Birth</label>
                            <input type="date" name="date_of_birth" class="form-control"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Position *</label>
                            <select name="position" class="form-select" required>
                                <option value="">Select...</option>
                                <option value="Goalkeeper">Goalkeeper</option>
                                <option value="Defender">Defender</option>
                                <option value="Midfielder">Midfielder</option>
                                <option value="Forward">Forward</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Jersey Number</label>
                            <input type="number" name="jersey_number" class="form-control" min="1" max="99"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Club</label>
                            <select name="club_id" class="form-select">
                                <option value="">Free Agent</option>
                                {% for c in all_clubs %}
                                <option value="{{ c.club_id }}">{{ c.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Market Value (M€)</label>
                            <input type="number" name="market_value" class="form-control"
                                   step="0.1" min="0" placeholder="e.g. 50.0"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Contract End Date</label>
                            <input type="date" name="contract_end" class="form-control"/>
                        </div>
                        <div class="col-12 text-end mt-2">
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-save me-1"></i>Save Player
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
