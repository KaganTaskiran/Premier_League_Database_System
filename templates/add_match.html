{% extends "base.html" %}
{% block title %}Add Match – Premier League DB{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
    <a href="{{ url_for('matches') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back
    </a>
    <h2 class="fw-bold mb-0"><i class="bi bi-plus-circle-fill text-dark me-2"></i>Add Match Result</h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white fw-bold">Match Details</div>
            <div class="card-body">
                <form method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Home Club *</label>
                            <select name="home_club_id" class="form-select" required>
                                <option value="">Select club...</option>
                                {% for c in all_clubs %}
                                <option value="{{ c.club_id }}">{{ c.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Away Club *</label>
                            <select name="away_club_id" class="form-select" required>
                                <option value="">Select club...</option>
                                {% for c in all_clubs %}
                                <option value="{{ c.club_id }}">{{ c.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Home Score *</label>
                            <input type="number" name="home_score" class="form-control" min="0" value="0" required/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Away Score *</label>
                            <input type="number" name="away_score" class="form-control" min="0" value="0" required/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Gameweek</label>
                            <input type="number" name="gameweek" class="form-control" min="1" max="38"/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold">Season *</label>
                            <input type="text" name="season" class="form-control" value="2024/25"
                                   placeholder="2024/25" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Match Date *</label>
                            <input type="date" name="match_date" class="form-control" required/>
                        </div>
                        <div class="col-12 text-end mt-2">
                            <button type="submit" class="btn btn-dark px-4">
                                <i class="bi bi-save me-1"></i>Save Match
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="alert alert-info mt-3 small">
            <i class="bi bi-info-circle me-1"></i>
            After saving, league standings will be updated automatically via the stored procedure.
        </div>
    </div>
</div>
{% endblock %}
